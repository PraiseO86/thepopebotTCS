name: Tomorrow Will-Call Forecast

# 1. THE TRIGGER
on:
  workflow_dispatch: 
    # This gives you the manual "Run workflow" button in GitHub

# 2. THE ACTION
jobs:
  predict_tomorrow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas

      - name: Create Reports Folder
        run: mkdir -p reports

      - name: Run Tomorrow's Predictor
        run: python analyze_tomorrow.py > reports/tomorrow_forecast.md

      - name: Commit Report to Memory
        run: |
          git config --global user.name 'thepopebot-automation'
          git config --global user.email 'automation@tcs-nemt.com'
          git add reports/tomorrow_forecast.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-generated tactical forecast for tomorrow"
          git push
